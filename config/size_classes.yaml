# Classi dimensionali usate nella pipeline.
# original mantiene la classe pubblicata dalla fonte.
# harmonised crea una classificazione comune per la dashboard esterna.

eurostat_official:
  - original: 0-9
    harmonised: 0-9
    label_it: 0-9 occupati
    method_status: observed_official
  - original: 10-19
    harmonised: 10-19
    label_it: 10-19 occupati
    method_status: observed_official
  - original: 20-49
    harmonised: 20-49
    label_it: 20-49 occupati
    method_status: observed_official
  - original: 50-249
    harmonised: 50-249
    label_it: 50-249 occupati
    method_status: observed_official
  - original: 250+
    harmonised: 250+
    label_it: 250 o più occupati
    method_status: observed_official

business_demography:
  - original: 0
    harmonised: 0
    label_it: 0 occupati
    method_status: distribution_only
  - original: 1-4
    harmonised: 1-4
    label_it: 1-4 occupati
    method_status: distribution_only
  - original: 5-9
    harmonised: 5-9
    label_it: 5-9 occupati
    method_status: distribution_only
  - original: 10+
    harmonised: 10+
    label_it: 10 o più occupati
    method_status: distribution_only

experimental_fine:
  - 0
  - 1
  - 2-4
  - 5-9
  - 10-14
  - 15-19
  - 20-49
  - 50-99
  - 100-249
  - 250-499
  - 500+
